name: Vulnerability Check

on:
  pull_request_target:
    paths:
      - 'app/**'

concurrency:
  group: vuln-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: 20

jobs:
  vuln-build:
    name: Build PR (with pnpm cache)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR merged code (fork included)
        uses: actions/checkout@v6.0.2
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.4.0

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v5.0.4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}-v1
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm run build

      - name: Run vuln check
        run: |
          echo "Running vuln.yaml check..."
          cat vuln.yaml